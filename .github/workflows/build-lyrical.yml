name: Lyrical
on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  schedule:
    # Run every morning at 01:00 to detect flakiness and broken dependencies
    - cron: '0 1 * * *'
      timezone: "Europe/Zurich"

jobs:
  lyrical_binary_master:
    uses: ./.github/workflows/reusable_ici.yml
    with:
      ros_distro: lyrical
      ros_repo: main
      upstream_workspace: 'repos.list'
      ref_for_scheduled_build: master
      before_install_upstream_dependencies: 'sudo apt install -y libboost-regex-dev'